jobs:
  - job: tests
    trigger: pull_request
    # Suffix for job name
    identifier: "acceptance-x86_64"
    targets:
      # This target is not used at all by our tests, but it has to be one of the available - https://packit.dev/docs/configuration/#aliases
      - fedora-38
    skip_build: true
    tf_extra_params:
      test:
        name: acceptance
      environments:
        arch: x86_64
      settings:
        pipeline:
          timeout: 8h
  - job: tests
    trigger: pull_request
    # Suffix for job name
    identifier: "acceptance-arm64"
    targets:
      # This target is not used at all by our tests, but it has to be one of the available - https://packit.dev/docs/configuration/#aliases
      - fedora-38
    skip_build: true
    tf_extra_params:
      test:
        name: acceptance
      environments:
        arch: aarch64
      settings:
        pipeline:
          timeout: 8h
